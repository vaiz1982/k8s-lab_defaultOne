apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1-deploy
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-1
  template:
    metadata:
      labels:
        app: app-1
    spec:
      containers:
        - name: web-server-1
          image: nginx:alpine
          ports:
            - containerPort: 80
